{% extends 'voicewake/base.html' %}

{% block extra_head %}
    <title>
        VoiceWake - Log In
    </title>
    <meta name="description" content="Log in and rejoin the fun!">
{% endblock %}

{% block content %}

    <!--backdrop and title-->
    <div class="w-full h-fit relative">

        <!--backdrop-->
        <div id="v-backdrop-anime-target" class="absolute w-full h-full -z-10 pb-14"></div>

        <!--same as VTitle-->
        <!--play with "to-x%" until the edges at div is smooth, and not stopped abruptly-->
        <div class="w-fit h-fit text-center mx-auto px-2 pt-10 pb-4 flex flex-col items-center rounded-full bg-gradient-radial from-theme-light dark:from-theme-dark from-0% to-70%">
            <h1 class="text-4xl h-fit break-words">
                Log In
            </h1>
            {% if redirected_message|length > 0 %}
                <h2 class="text-xl font-medium h-fit break-words">
                    {{ redirected_message }}
                </h2>
            {% endif %}
        </div>
    </div>

    <div id="log-in-page"></div>
{% endblock %}
