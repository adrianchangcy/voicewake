{% extends 'voicewake/base.html' %}
{% block title %}Sign Up{% endblock %}
{% load crispy_forms_tags %}

{% block content %}
<form method="post">
    {% csrf_token %}
    {{form|crispy}}
    <p>Already have an account? Log in <a href="/login">here</a></p>
    <button type="submit" class="btn btn-success">Sign Up</button>
</form>
{% endblock %}
