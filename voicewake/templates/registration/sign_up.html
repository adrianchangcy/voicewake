{% extends 'voicewake/base.html' %}
{% block title %}Sign Up{% endblock %}

{%load static%}

{% block content %}
<form method="post">

    {% csrf_token %}
      
    <div class="field">
        <label class="label">Username</label>
        <div class="control has-icons-left has-icons-right">
            <input class="input is-success" type="text" placeholder="Text input" value="bulma">
                <span class="icon is-small is-left">

                    <img src="{%static "svg/user-regular.svg"%}" alt="user icon"></img>
                </span>
            <span class="icon is-small is-right">
                <img src="{%static "svg/check-solid.svg"%}" alt="ok icon"></img>
            </span>
        </div>
        <p class="help is-success">This username is available</p>
    </div>


    
      <div class="field">
        <label class="label">Email</label>
        <div class="control has-icons-left has-icons-right">
          <input class="input is-danger" type="email" placeholder="Email input" value="hello@">
          <span class="icon is-small is-left">
            <i class="fas fa-envelope"></i>
          </span>
          <span class="icon is-small is-right">
            <i class="fas fa-exclamation-triangle"></i>
          </span>
        </div>
        <p class="help is-danger">This email is invalid</p>
      </div>
      
      <div class="field">
        <label class="label">Subject</label>
        <div class="control">
          <div class="select">
            <select>
              <option>Select dropdown</option>
              <option>With options</option>
            </select>
          </div>
        </div>
      </div>
      
      <div class="field">
        <label class="label">Message</label>
        <div class="control">
          <textarea class="textarea" placeholder="Textarea"></textarea>
        </div>
      </div>
      
      <div class="field">
        <div class="control">
          <label class="checkbox">
            <input type="checkbox">
            I agree to the <a href="#">terms and conditions</a>
          </label>
        </div>
      </div>
      
      <div class="field">
        <div class="control">
          <label class="radio">
            <input type="radio" name="question">
            Yes
          </label>
          <label class="radio">
            <input type="radio" name="question">
            No
          </label>
        </div>
      </div>
      
      <div class="field is-grouped">
        <div class="control">
          <button class="button is-link">Submit</button>
        </div>
        <div class="control">
          <button class="button is-link is-light">Cancel</button>
        </div>
      </div>
    {{form}}
    {% comment %} <p>Already have an account? Log in <a href="/login">here</a></p>
    <button type="submit" class="btn btn-success">Sign Up</button> {% endcomment %}
</form>
{% endblock %}
