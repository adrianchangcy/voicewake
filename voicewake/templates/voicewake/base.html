<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% endblock %}

    <title>
        {% block title %}My Site{% endblock %}
    </title>

    <!--user-->
    {{user.username | json_script:"data-username"}}


    <!--critical assets-->
    <!--if too slow, revert to placing at end of <body> to prioritise content itself-->
    {% load static %}
    <link href="{% static 'css/output.css' %}" rel="preload" as="style" type="text/css" onload="this.rel='stylesheet'"/>
    <!--importing separate styles is slightly more performant than all.css, as per docs-->
    <!--if you want to use fa-regular, import fontawesomefree/css/regular.css, etc.-->
    <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="preload" as="style" type="text/css" onload="this.rel='stylesheet'">
    <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="preload" as="style" type="text/css" onload="this.rel='stylesheet'">
    <link href="{% static 'fontawesomefree/css/regular.css' %}" rel="preload" as="style" type="text/css" onload="this.rel='stylesheet'">
</head>


{% block body %}

    <!--nav-->
    <div id="nav-bar-app" class="fixed w-full h-[4.5rem] top-0 z-50"></div>

    <body class="mt-[4.5rem] overflow-x-hidden overflow-y-scroll bg-theme-light">

        <!--content-->
        <div class="min-h-screen md:w-2/4 lg:w-3/6 xl:w-2/6 mx-auto text-left text-lg px-[5%] pb-10">
            {% block content %}
            {% endblock %}
        </div>

        <!--pretty waves at footer, using lighter + darker combo for 3D effect-->
        <!--prefer implementing this way, because inline svg would otherwise unpleasantly appear while other stuff is loading-->
        <div class="w-full h-fit relative">
            <!--lighter-->
            <div class="absolute left-0 right-0 bottom-0 m-auto">
                <object data="{% static 'svg/footer_wave_lighter.svg' %}" type="image/svg+xml"></object>
            </div>
            <!--darker, main colour-->
            <div class="absolute left-0 right-0 -bottom-1 m-auto">
                <object data="{% static 'svg/footer_wave_darker.svg' %}" type="image/svg+xml"></object>
            </div>
            <!--to define parent size-->
            <div class="w-full h-fit opacity-0">
                <object data="{% static 'svg/footer_wave_lighter.svg' %}" type="image/svg+xml"></object>
            </div>
        </div>

        <!--footer-->
        <div class="h-60 footer-colour">
        </div>

        <!--Vue-->
        <script type="text/javascript" src="{% static 'src/vue/dist/js/chunk-vendors.js' %}"></script>
        <script type="text/javascript" src="{% static 'src/vue/dist/js/app.js' %}"></script>
    </body>
{% endblock %}
</html>


<script>

    //prevent scrolling on spacebar without disabling input space
    window.addEventListener('keydown', (event) => {
        if(event.keyCode === 32 && event.target === document.body){
            event.preventDefault();
        }
    });

</script>
