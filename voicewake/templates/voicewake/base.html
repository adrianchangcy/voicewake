<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% endblock %}

    <title>
        {% block title %}My Site{% endblock %}
    </title>

    <!--user-->
    {{user.username | json_script:"data-username"}}
</head>

{% load static %}

{% block body %}

    <!--nav-->
    <div id="nav-bar-app" class="fixed w-full h-[4.5rem] top-0 z-50"></div>

    <body class="mt-[4.5rem] overflow-x-hidden overflow-y-scroll bg-theme-light">

        <!--content-->
        <div class="min-h-screen md:w-2/4 lg:w-3/6 xl:w-2/6 mx-auto text-left text-lg px-[5%] pb-10">
            {% block content %}
            {% endblock %}
        </div>

        <!--pretty waves at footer, using lighter + darker combo for 3D effect-->
        <!--prefer implementing this way, because inline svg would otherwise unpleasantly appear while other stuff is loading-->
        <div class="w-full h-fit relative">
            <!--mountain 1-->
            <div class="absolute left-0 right-0 bottom-4 m-auto">
                <object data="{% static 'svg/footer_mountain_1.svg' %}" type="image/svg+xml"></object>
            </div>
            <!--fill gap from mountain 1's bottom-4-->
            <div class="w-full h-4 absolute left-0 right-0 bottom-0 m-auto bg-theme-green-1">
            </div>
            <!--mountain 2-->
            <div class="absolute left-0 right-0 bottom-0 m-auto">
                <object data="{% static 'svg/footer_mountain_2.svg' %}" type="image/svg+xml"></object>
            </div>
            <!--mountain 3-->
            <div class="absolute left-0 right-0 bottom-0 m-auto">
                <object data="{% static 'svg/footer_mountain_3.svg' %}" type="image/svg+xml"></object>
            </div>

            <!--to define parent size with one mountain (all the same size) and any gap used-->
            <div class="w-full h-fit opacity-0">
                <object data="{% static 'svg/footer_mountain_1.svg' %}" type="image/svg+xml"></object>
            </div>
            <div class="w-full h-4 opacity-0">
            </div>
        </div>

        <!--footer-->
        <div class="h-60 bg-gradient-to-b from-theme-green-3 to-theme-black">
        </div>

        <!--CSS-->
        <link href="{% static 'css/output.css' %}" rel="stylesheet"/>
        <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="stylesheet">
        <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="stylesheet">
        <link href="{% static 'fontawesomefree/css/regular.css' %}" rel="stylesheet">

        <!--Vue-->
        <script type="text/javascript" src="{% static 'src/vue/dist/js/chunk-vendors.js' %}"></script>
        <script type="text/javascript" src="{% static 'src/vue/dist/js/app.js' %}"></script>
    </body>
{% endblock %}
</html>


<script>

    //prevent scrolling on spacebar without disabling input space
    window.addEventListener('keydown', (event) => {
        if(event.keyCode === 32 && event.target === document.body){
            event.preventDefault();
        }
    });

</script>
