<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}My Site{% endblock %}</title>
</head>

{% load static %}

<body class="has-navbar-fixed-top">
    {%block navbar%}
    <nav class="navbar is-fixed-top is-size-3" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <!--for navbar-brand, put as few items as possible to avoid overflowing on smaller devices-->
            <a class="navbar-item is-justify-content-center" href="/">
                <span class="icon is-large">
                    <i class="fas fa-wave-square fa-lg"></i>
                </span>
            </a>
            <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarEssence">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </a>
        </div>

        <!--could only get SVG to work via img tag-->
        <!--document uses <span class="icon"><i class="fas __"></i></span>-->
        <!--but i prefer using downloaded svg directly-->
        <!--we remove that span, and have img inherit its class="icon" to utilise its sizings-->
        <div id="navbarEssence" class="navbar-menu">
            <div class="navbar-start">
                <a class="navbar-item">
                    <span class="icon-text">
                        <span class="icon">
                            <i class="fas fa-microphone fa-lg"></i>
                        </span>
                        <span>Talk</span>
                    </span>
                </a>
                <a class="navbar-item">
                    <span class="icon-text">
                        <span class="icon">
                            <i class="far fa-calendar-plus fa-lg"></i>
                        </span>
                        <span>Request</span>
                    </span>
                </a>
                <a class="navbar-item">
                    <span class="icon-text">
                        <span class="icon">
                            <i class="fas fa-book fa-lg"></i>
                        </span>
                        <span>About</span>
                    </span>
                </a>
            </div>
      
            <div class="navbar-end">
                {% if user.is_authenticated %}
                    <div class="navbar-item has-dropdown is-hoverable">
                        <a class="navbar-link">
                            <strong>{{user.username}}</strong>
                        </a>
                        <div class="navbar-dropdown is-size-4">
                            <a class="navbar-item">
                                Profile
                            </a>
                            <a class="navbar-item">
                                Past Talks
                            </a>
                            <a class="navbar-item">
                                Past Requests
                            </a>
                            <hr class="navbar-divider">
                            <a class="navbar-item">
                                Log Out
                            </a>
                        </div>
                    </div>
                {%else%}
                    <div class="navbar-item">
                        <div class="buttons">
                            <a class="button is-primary" href="/sign-up">
                                <strong>Sign up</strong>
                            </a>
                            <a class="button is-light" href="/login">
                                Log in
                            </a>
                        </div>
                    </div>
                {%endif%}
            </div>
        </div>
    </nav>
    {%endblock%}

    {%block content%}
    {%endblock%}

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>
    <link
        href="http://ajax.googleapis.com/ajax/libs/jqueryui/1.8.16/themes/ui-lightness/jquery-ui.css"
        rel="stylesheet"
        type="text/css"
    />
    <link rel="stylesheet" href="{%static 'node_modules/bulma/css/bulma.css' %}"/>
    <script src="{%static 'js/base.js' %}"></script>
    <link rel="stylesheet" href="{%static 'css/base.css' %}"/>
    <!--importing separate styles is slightly more performant than all.css, as per docs-->
    <!--if you want to use fa-regular, import fontawesomefree/css/regular.css, etc.-->
    <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'fontawesomefree/css/brands.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'fontawesomefree/css/regular.css' %}" rel="stylesheet" type="text/css">
</body>

</html>
