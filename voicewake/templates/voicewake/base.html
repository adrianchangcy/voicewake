<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% endblock %}

    <title>
        {% block title %}My Site{% endblock %}
    </title>

    <!--use getDataFromTemplate() to retrieve these data-->
    {{user.username | json_script:"data-username"}}
    {{user.is_authenticated | json_script:"data-is-authenticated"}}
</head>

{% load static %}

{% block body %}

    {% csrf_token %}

    <!--base-->
    <div id="base-app" class="fixed w-full h-[4.5rem] top-0 z-50"></div>

    <body class="mt-[4.5rem] overflow-x-hidden overflow-y-scroll bg-theme-light">

        <!--content-->
        <div class="min-h-[calc(100vh-4.5rem)] sm:w-3/4 md:w-2/4 xl:w-5/12 mx-auto text-left text-lg px-[5%] pb-10">
            
            {% block content %}
            {% endblock %}
        </div>

        <!--breakpoint before footer-->
        <div class="w-full h-0 mt-[25%] relative">
            <div class="w-full absolute bottom-0 m-auto -z-10">
                <object data="{% static 'svg/before_footer_mountain.svg' %}" type="image/svg+xml"></object>
            </div>
        </div>

        <!--footer-->
        <div class="h-60 bg-gradient-to-b from-theme-green-3 to-theme-black">
        </div>

        <!--CSS-->
        <link href="{% static 'css/output.css' %}" rel="stylesheet"/>
        <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="stylesheet">
        <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="stylesheet">
        <link href="{% static 'fontawesomefree/css/regular.css' %}" rel="stylesheet">

        <!--Vue-->
        <script type="text/javascript" src="{% static 'src/vue/dist/js/chunk-vendors.js' %}"></script>
        <script type="text/javascript" src="{% static 'src/vue/dist/js/app.js' %}"></script>
    </body>
{% endblock %}
</html>


<script>

    //prevent scrolling on spacebar without disabling input space
    window.addEventListener('keydown', (event) => {
        if(event.keyCode === 32 && event.target === document.body){
            event.preventDefault();
        }
    });

</script>
