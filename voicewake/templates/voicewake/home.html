{% extends 'voicewake/base.html' %}

{% block extra_head %}
    <title>
        VoiceWake - Two people saying things.
    </title>
    <meta name="description" content="VoiceWake - Start an event, or reply in events to complete them.">
{% endblock %}

{% block content %}

    <!--backdrop and title-->
    <div class="w-full h-fit relative">

        <!--backdrop-->
        <div id="v-backdrop-anime-target" class="absolute w-full h-full -z-10 pb-14"></div>

        <!--title-->
        <!--play with "to-x%" until the edges at div is smooth, and not stopped abruptly-->
        <div class="w-fit h-fit mx-auto px-4 sm:px-8 py-8 flex flex-col items-center text-center dark:text-dark-theme-white-1 rounded-full bg-gradient-radial from-theme-light dark:from-theme-dark from-0% to-70%">
            <h1 class="text-5xl h-fit break-words">
                <span>VoiceWake</span>
            </h1>
            <h2 class="text-xl font-medium h-fit break-words">
                <span>Two people saying things.</span>
            </h2>
        </div>
    </div>

    <div id="browse-events-app"></div>
{% endblock %}
