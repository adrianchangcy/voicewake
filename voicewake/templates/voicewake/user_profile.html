{% extends 'voicewake/base.html' %}

{% block extra_head %}
    <title>
        User: {{ username }}
    </title>
    <meta name="description" content="{{ username }}'s page.">
{% endblock %}

{% block content %}

    <div
        data-username="{{ username }}"
        data-is-own-page="{{ is_own_page }}"
        data-is-blocked="{{is_blocked}}"
        id="data-container-get-user-profile"
    >

        <div id="get-user-profile-app"></div>
    </div>
{% endblock %}
