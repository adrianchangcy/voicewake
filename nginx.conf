
#user  nobody;


worker_processes  1;
events {
    worker_connections  10000;
}
worker_rlimit_nofile  20000;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  10;

    limit_req_zone $binary_remote_addr zone=default:1m rate=4r/s;
    limit_req_zone $binary_remote_addr zone=common_list_apis:1m rate=40r/m;
    limit_req_zone $binary_remote_addr zone=common_get_apis:1m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=light_compute_apis:1m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=heavy_compute_apis:1m rate=40r/m;
    limit_req_zone $binary_remote_addr zone=account_apis:1m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=audio_clip_reports:1m rate=10r/m;

    #gzip  on;

    server {
        listen       8000;
        server_name  127.0.0.1;

        #need this for keepalive
        proxy_http_version 1.1;
        proxy_set_header   "Connection" "";

        #allow only localhost in dev, or authorised users in staging
        satisfy any;
        allow 127.0.0.1;
        auth_basic "nono nuh uh";
        auth_basic_user_file /etc/apache2/.htpasswd;
        deny all;


        #charset koi8-r;

        #access_log  logs/host.access.log  main;

        #location / {
        #    root   html;
        #    index  index.html index.htm;
        #}

        #error_page  404              /404.html;


        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        location ^~ /static/ {
            proxy_pass https://d3cej2n7sifsea.cloudfront.net$request_uri;
        }

        location / {
            proxy_pass http://127.0.0.1:8000;
            limit_req zone=default burst=60 nodelay;
        }

        location ^~ /api/events/list/ {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=common_list_apis burst=20 nodelay;
        }

        location /api/events/create {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=heavy_compute_apis;
            client_max_body_size 3m;
        }
        location = api/events/replies/choices/list {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=heavy_compute_apis;
        }
        location ^~ /api/events/replies/ {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=heavy_compute_apis;
        }
        location = /api/events/replies/create {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=heavy_compute_apis;
            client_max_body_size 3m;
        }
        location ^~ /api/events/get/ {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=common_get_apis;
        }

        location = /api/audio-clips/reports {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=audio_clip_reports;
        }
        location = /api/audio-clips/tones/list {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=common_list_apis burst=10;
        }
        location = /api/audio-clips/likes-dislikes {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=light_compute_apis;
            keepalive_timeout  20;
        }
        location ^~ /api/audio-clips/bans/list/ {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=common_list_apis burst=10;
        }

        location ^~ /api/users/blocks/list/ {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=common_list_apis burst=10;
        }
        location ^~ /api/users/ {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=account_apis burst=20;
        }
        location ^~ /api/users/username/get/ {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=common_get_apis burst=20;
            keepalive_timeout  30;
        }
        location = /api/users/username/set {
            proxy_pass http://127.0.0.1:8000$request_uri;
            limit_req zone=account_apis burst=10;
        }











        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        #
        #location ~ \.php$ {
        #    root           html;
        #    fastcgi_pass   127.0.0.1:9000;
        #    fastcgi_index  index.php;
        #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        #    include        fastcgi_params;
        #}

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        #
        #location ~ /\.ht {
        #    deny  all;
        #}
    }


    # another virtual host using mix of IP-, name-, and port-based configuration
    #
    #server {
    #    listen       8000;
    #    listen       somename:8080;
    #    server_name  somename  alias  another.alias;

    #    location / {
    #        root   html;
    #        index  index.html index.htm;
    #    }
    #}


    # HTTPS server
    #
    #server {
    #    listen       443 ssl;
    #    server_name  localhost;

    #    ssl_certificate      cert.pem;
    #    ssl_certificate_key  cert.key;

    #    ssl_session_cache    shared:SSL:1m;
    #    ssl_session_timeout  5m;

    #    ssl_ciphers  HIGH:!aNULL:!MD5;
    #    ssl_prefer_server_ciphers  on;

    #    location / {
    #        root   html;
    #        index  index.html index.htm;
    #    }
    #}

}
