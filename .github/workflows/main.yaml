#for things that went wrong, refer to: project > Actions > all workflows

#workflow:
  #done with feature branch, do pull request to main: test, collectstatic, build, deploy to stage
  #pull request successful (merged): test, collectstatic, build, deploy to prod

name: test, collectstatic, build, deploy

on:
  pull_request:
    #opened/reopened: when pull request is made
    #closed: when pull request is merged
    types: [opened, closed]

jobs:
  run_test:
    runs-on: ubuntu-latest
    container:
      image: python:latest
    #postgres, redis
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379    
    #run django tests
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Install Django dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python manage.py test voicewake.tests.test_apis.Users_TestCase
        env:
          DATABASE_NAME: postgres
          DATABASE_USER: postgres
          DATABASE_PASS: postgres
          DATABASE_HOST: postgres
          DATABASE_PORT: 5432
          REDIS_ENDPOINT: redis://redis
          REDIS_PASSWORD:
