#for things that went wrong, refer to: project > Actions > all workflows

#current stage/prod setup
  #everything in EC2 small, using EBS so db data persists when instance is down
  #pull from ECR
  #do scheduled pg_dump/pg_dumpall into S3

#ideal stage/prod setup (waste of money for hobby project with 0 users)
  #AWS RDS for Postgresql
  #AWS Elasticache for Redis
  #AWS ECS for other containers

#consider this to test github actions locally:
  #https://github.com/nektos/act

#PREREQUISITE
#to avoid using long-lived secrets, there's a recommended whole headache to setting up OpenID Connect (OIDC)
  #at IAM > policies > add all ECR actions in it
  #at IAM > identity providers > add >
    #provider type: OpenID Connect
    #provider URL: https://token.actions.githubusercontent.com
    #audience: sts.amazonaws.com
  #at IAM > roles > create >
    #trusted identity type: Web identity
    #identity provider: the one you created, should be listed as "token.actions.githubusercontent.com"
    #audience: sts.amazonaws.com
    #github organization: your_github_username_or_actual_github_org
    #permission: select the ECR policy with all ECR actions
  #resources
    #https://docs.github.com/en/actions/how-tos/secure-your-work/security-harden-deployments

#testing notes:
  #to skip jobs:
    #do "if: false" inside a job
  #to only run a job on pull request merged:
    #github.event.pull_request.merged == true

name: Run tests, build and deploy to ECR, collectstatic to S3

on:
  pull_request:
    #currently using "opened" only to run tests and nothing else
    #"closed" alone is bad, as closed covers both merged and not merged, so also check for: github.event.pull_request.merged
    #on merge, build and deploy to ECR, refer to this (not sure where to define in .yaml):
      #https://github.com/orgs/community/discussions/26724#discussioncomment-3253096
    types: [opened, reopened, closed]

jobs:
  #run tests on pull request open/reopen/merged
  #"closed" alone does not guarantee merged == true
  run_tests:
    #using ">" instead of "|" so whitespace and newlines below are not preserved, i.e. only pretty in .yaml
    if: >
      github.event_name == 'pull_request' &&
      (
        github.event.action == 'opened' ||
        github.event.action == 'reopened' ||
        (github.event.action == 'closed' && github.event.pull_request.merged == true)
      )
    #specify environment to choose from git > settings > environments
    #https://stackoverflow.com/questions/66521958/how-to-access-environment-secrets-from-a-github-workflow
    environment: dev
    runs-on: ubuntu-22.04-arm
    container:
      image: python:latest
    #postgres, redis
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_DB: voicewake
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: localhost
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379    
    #run django tests
    #always using dev
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5
      - name: Install Django dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Migrate and run tests
        env:
          DJANGO_SETTINGS_MODULE: voicewake.settings.dev
          SECRET_KEY: abc123
          ALLOWED_HOSTS: "*"
          DB_HOST: postgres
          DB_NAME: voicewake
          DB_USER: postgres
          DB_PASSWORD: localhost
          DB_PORT: 5432
          REDIS_ENDPOINT: redis://redis
          #tests don't use actual email, so leave AWS_SES empty
          AWS_SES_HOST: ''
          AWS_SES_SMTP_USER_NAME: ''
          AWS_SES_SMTP_PASSWORD: ''
          AWS_SES_FROM_EMAIL: ''
          AWS_SES_IAM_USER_NAME: ''
          #at github secrets
          #env vars defined in github environments (project>settings>environments) introduces unwanted whitespace and newlines
          #at python, to remove all whitespace and newlines, do: ''.join(os.environ['YOUR_VAR'].split())
          AWS_S3_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          AWS_S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
          AWS_S3_REGION_NAME: ${{ secrets.AWS_S3_REGION_NAME }}
          AWS_S3_CUSTOM_DOMAIN: ${{ secrets.AWS_S3_CUSTOM_DOMAIN }}
          AWS_S3_STATIC_BUCKET_NAME: ${{ secrets.AWS_S3_STATIC_BUCKET_NAME }}
          AWS_S3_MEDIA_BUCKET_NAME: ${{ secrets.AWS_S3_MEDIA_BUCKET_NAME }}
          AWS_S3_UGC_UNPROCESSED_BUCKET_NAME: ${{ secrets.AWS_S3_UGC_UNPROCESSED_BUCKET_NAME }}
          AWS_LAMBDA_ACCESS_KEY_ID: ${{ secrets.AWS_LAMBDA_ACCESS_KEY_ID }}
          AWS_LAMBDA_SECRET_ACCESS_KEY: ${{ secrets.AWS_LAMBDA_SECRET_ACCESS_KEY }}
          AWS_LAMBDA_REGION_NAME: ${{ secrets.AWS_LAMBDA_REGION_NAME }}
          AWS_LAMBDA_NORMALISE_FUNCTION_NAME: ${{ secrets.AWS_LAMBDA_NORMALISE_FUNCTION_NAME }}
        run: |
          python manage.py migrate
          python manage.py test voicewake.tests.test_apis.Core_TestCase
          python manage.py test voicewake.tests.test_apis.Users_TestCase
          python manage.py test voicewake.tests.test_apis.Core_NormaliseAudioClips_TestCase
          python manage.py test voicewake.tests.test_cronjobs.Core_TestCase
          python manage.py test voicewake.tests.test_cronjobs.Core_TransactionTestCase

  #do push/repush before merged
  #stage and prod ECS will explicitly use specific tags, i.e. no conflict
  docker_build_tag_push_to_ecr:
    needs: run_tests
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'reopened')
    environment: dev
    runs-on: ubuntu-22.04-arm
    permissions:
      id-token: write   # This is required for requesting the AWS JWT
      contents: read    # This is required for actions/checkout
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5
      #before starting AWS credentials, read above on prerequisite via OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_ECR_REGION_NAME }}
      - name: Login to AWS ECR
        id: login-aws-ecr
        uses: aws-actions/amazon-ecr-login@v2
      #github action runs at root of repository, not ./.github/workflows/*
        #i.e. no need to do ../../../docker-compose.yaml
      - name: Build with Docker Compose, tag with AWS ECR tags, and push to AWS ECR using the tags
        env:
          DOCKER_COMPOSE_NAME: vw
          AWS_ECR_ACCOUNT_ID: ${{ secrets.AWS_ECR_ACCOUNT_ID }}
          AWS_ECR_REGION_NAME: ${{ secrets.AWS_ECR_REGION_NAME }}
          #using numbered image tag instead of "latest", allows 0 conflict between server-used images and new images
          IMAGE_TAG: ${{ github.event.pull_request.number }}
        #github deprecated v1, so use "docker compose", not "docker-compose"
        #docker tag image reference tip
          #for docker compose images that only has "image" in .yaml to use fully prebuilt images, no .dockerfile, e.g. "redis:latest":
            #must reference it using "redis:latest"
          #for docker compose build images that use .dockerfile, docker has a default naming convention for it:
            #must reference it using "COMPOSE_NAME_AT_YAML-container_name:latest"
        #1 docker tag can only point to 1 image
        run: |
          export REGISTRY="${AWS_ECR_ACCOUNT_ID}.dkr.ecr.${AWS_ECR_REGION_NAME}.amazonaws.com"
          docker compose --file docker-compose-push-ecr.yaml up -d --no-deps --force-recreate --no-start --build
          docker tag "postgres:latest" "${REGISTRY}/${DOCKER_COMPOSE_NAME}/postgres:${IMAGE_TAG}"
          docker tag "redis:latest" "${REGISTRY}/${DOCKER_COMPOSE_NAME}/redis:${IMAGE_TAG}"
          docker tag "${DOCKER_COMPOSE_NAME}-django_celery_beat:latest" "${REGISTRY}/${DOCKER_COMPOSE_NAME}/django_celery_beat:${IMAGE_TAG}"
          docker tag "${DOCKER_COMPOSE_NAME}-django_celery_worker:latest" "${REGISTRY}/${DOCKER_COMPOSE_NAME}/django_celery_worker:${IMAGE_TAG}"
          docker tag "${DOCKER_COMPOSE_NAME}-django_gunicorn:latest" "${REGISTRY}/${DOCKER_COMPOSE_NAME}/django_gunicorn:${IMAGE_TAG}"
          docker tag "${DOCKER_COMPOSE_NAME}-nginx:latest" "${REGISTRY}/${DOCKER_COMPOSE_NAME}/nginx:${IMAGE_TAG}"
          docker push "${REGISTRY}/${DOCKER_COMPOSE_NAME}/postgres:${IMAGE_TAG}"
          docker push "${REGISTRY}/${DOCKER_COMPOSE_NAME}/redis:${IMAGE_TAG}"
          docker push "${REGISTRY}/${DOCKER_COMPOSE_NAME}/django_celery_beat:${IMAGE_TAG}"
          docker push "${REGISTRY}/${DOCKER_COMPOSE_NAME}/django_celery_worker:${IMAGE_TAG}"
          docker push "${REGISTRY}/${DOCKER_COMPOSE_NAME}/django_gunicorn:${IMAGE_TAG}"
          docker push "${REGISTRY}/${DOCKER_COMPOSE_NAME}/nginx:${IMAGE_TAG}"

  #build frontend code > place at local static > use django collectstatic to also create backend static files and deploy entire static folder to S3
  #context:
    #refer to ./frontend/vite.config.ts
      #separate stage/prod here
      #tell where built frontend code should go, which is locally at ./static
      #the "base" option will be used in built frontend code too, concerning accurate URLs for frontend files and web worker files
  vite_build_django_collectstatic_to_s3_stage:
    needs: docker_build_tag_push_to_ecr
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'reopened')
    environment: dev
    runs-on: ubuntu-22.04-arm
    env:
      STAGE_OR_PROD: stage
      SECRET_KEY: abc123
      ALLOWED_HOSTS: "*"
      DB_HOST: postgres
      DB_NAME: voicewake
      DB_USER: postgres
      DB_PASSWORD: localhost
      DB_PORT: 5432
      REDIS_ENDPOINT: redis://redis
      #tests don't use actual email, so leave AWS_SES empty
      AWS_SES_HOST: ''
      AWS_SES_SMTP_USER_NAME: ''
      AWS_SES_SMTP_PASSWORD: ''
      AWS_SES_FROM_EMAIL: ''
      AWS_SES_IAM_USER_NAME: ''
      #at github secrets
      #env vars defined in github environments (project>settings>environments) introduces unwanted whitespace and newlines
      #at python, to remove all whitespace and newlines, do: ''.join(os.environ['YOUR_VAR'].split())
      AWS_S3_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
      AWS_S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
      AWS_S3_REGION_NAME: ${{ secrets.AWS_S3_REGION_NAME }}
      AWS_S3_CUSTOM_DOMAIN: ${{ secrets.AWS_S3_CUSTOM_DOMAIN }}
      AWS_S3_STATIC_BUCKET_NAME: ${{ secrets.AWS_S3_STATIC_BUCKET_NAME }}
      AWS_S3_MEDIA_BUCKET_NAME: ${{ secrets.AWS_S3_MEDIA_BUCKET_NAME }}
      AWS_S3_UGC_UNPROCESSED_BUCKET_NAME: ${{ secrets.AWS_S3_UGC_UNPROCESSED_BUCKET_NAME }}
      AWS_LAMBDA_ACCESS_KEY_ID: ''
      AWS_LAMBDA_SECRET_ACCESS_KEY: ''
      AWS_LAMBDA_REGION_NAME: ''
      AWS_LAMBDA_NORMALISE_FUNCTION_NAME: ''
      HTTP_CACHE_CONTROL_MAX_AGE: ${{ vars.HTTP_CACHE_CONTROL_MAX_AGE }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5
      #don't cd from absolute parent, i.e. /frontend, do ./frontend instead, where cd is already pre-configured to be at repository
      #full path of shell session from absolute parent: /home/runner/work/_temp/xxxx-xxxx.sh
      - name: Install frontend dependencies
        run: |
          cd ./frontend
          npm install --verbose
      - name: Install vite globally
        run: |
          cd ./frontend
          npm install -g vite
      - name: Build frontend with Vite
        run: |
          cd ./frontend
          vite build --emptyOutDir -- --env="${STAGE_OR_PROD}"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Django collectstatic to send built frontend + backend static files to S3
        run: |
          python manage.py collectstatic --settings="voicewake.settings.${STAGE_OR_PROD}" --no-input

  #separate stage and prod because:
    #frontend is only separated by stage/prod folders
    #between PR success and merge, you have time to shut down ECS and prepare new prod
    #if not done this way, then old server will suddenly start fetching new frontend code
  vite_build_django_collectstatic_to_s3_prod:
    needs: run_tests
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'closed' && github.event.pull_request.merged == true)
    environment: dev
    runs-on: ubuntu-22.04-arm
    env:
      STAGE_OR_PROD: prod
      SECRET_KEY: abc123
      ALLOWED_HOSTS: "*"
      DB_HOST: postgres
      DB_NAME: voicewake
      DB_USER: postgres
      DB_PASSWORD: localhost
      DB_PORT: 5432
      REDIS_ENDPOINT: redis://redis
      #tests don't use actual email, so leave AWS_SES empty
      AWS_SES_HOST: ''
      AWS_SES_SMTP_USER_NAME: ''
      AWS_SES_SMTP_PASSWORD: ''
      AWS_SES_FROM_EMAIL: ''
      AWS_SES_IAM_USER_NAME: ''
      #at github secrets
      #env vars defined in github environments (project>settings>environments) introduces unwanted whitespace and newlines
      #at python, to remove all whitespace and newlines, do: ''.join(os.environ['YOUR_VAR'].split())
      AWS_S3_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
      AWS_S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
      AWS_S3_REGION_NAME: ${{ secrets.AWS_S3_REGION_NAME }}
      AWS_S3_CUSTOM_DOMAIN: ${{ secrets.AWS_S3_CUSTOM_DOMAIN }}
      AWS_S3_STATIC_BUCKET_NAME: ${{ secrets.AWS_S3_STATIC_BUCKET_NAME }}
      AWS_S3_MEDIA_BUCKET_NAME: ${{ secrets.AWS_S3_MEDIA_BUCKET_NAME }}
      AWS_S3_UGC_UNPROCESSED_BUCKET_NAME: ${{ secrets.AWS_S3_UGC_UNPROCESSED_BUCKET_NAME }}
      AWS_LAMBDA_ACCESS_KEY_ID: ''
      AWS_LAMBDA_SECRET_ACCESS_KEY: ''
      AWS_LAMBDA_REGION_NAME: ''
      AWS_LAMBDA_NORMALISE_FUNCTION_NAME: ''
      HTTP_CACHE_CONTROL_MAX_AGE: ${{ vars.HTTP_CACHE_CONTROL_MAX_AGE }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5
      #don't cd from absolute parent, i.e. /frontend, do ./frontend instead, where cd is already pre-configured to be at repository
      #full path of shell session from absolute parent: /home/runner/work/_temp/xxxx-xxxx.sh
      - name: Install frontend dependencies
        run: |
          cd ./frontend
          npm install --verbose
      - name: Install vite globally
        run: |
          cd ./frontend
          npm install -g vite
      - name: Build frontend with Vite
        run: |
          cd ./frontend
          vite build --emptyOutDir -- --env="${STAGE_OR_PROD}"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Django collectstatic to send built frontend + backend static files to S3
        run: |
          python manage.py collectstatic --settings="voicewake.settings.${STAGE_OR_PROD}" --no-input
















