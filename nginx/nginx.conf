#note that nginx official image does not perform envsubst for nginx.conf, so cannot use env vars here
#can also consider not having nginx.conf at all and let nginx handle it all
    #thought it would be ideal to use lower-than-average specs for lower capacity EC2 that also hosts other containers

user  nginx;

#typically same as amount of CPU cores
worker_processes  1;

events {
    worker_connections  1000;
}

#typically worker_connections * 2
worker_rlimit_nofile  2000;


error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


#we put this here instead of http to make it easier
#just have to take extra precaution on not to match $var meant for NGINX with actual environment variables
include /etc/nginx/conf.d/*conf;
